name: Update the "PG books that need fixing" Google doc

on:
  schedule:
    - cron: '17 9 1 * *' # 09:17 UTC on the 1st of every month
  workflow_dispatch:

jobs:
  create_issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create monthly issue
        run: |
          gh issue create \
            --title "Monthly work item - $(date -u +'%B %Y')" \
            --body "## Monthly work item

          - [ ] Review outstanding tasks
          - [ ] Update priorities
          - [ ] Close or reschedule unfinished items

          Created automatically for $(date -u +'%B %Y')." \
            --assignee rtonsing \
            --label recurring \
            --label monthly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
